<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To - do list</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="head">  
        <h1 class="header">
            To - do list
        </h1>
        <p class="paragraph">
             A simple to - do list
        </p>
    </header>

    <main class="main">
        <div class="container">

            <input type="text" id="input" class="input" placeholder="Add a new task...">

            <button id="add-btn" class="add-btn">Add</button>

        </div>
<br>
         <h3 class="sub-header">Tasks : </h3>
        <ul id="task-list" class="list"></ul>
        <button id="clear-btn" class="clear-btn">Clear All</button>
        <p id="total" class="paragraph-1"> Total tasks: 0 </p>  
        </main>
        <script src="script.js"></script>
    </body>
</html>
